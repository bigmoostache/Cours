chapter: "Q&A"
label: "Infรฉrence Bayรฉsienne ยท Questions & Rรฉponses"
title: "Questions & Rรฉponses"
subtitle: "Cas pratiques, interprรฉtations et piรจges courants โ€” les questions que l'on se pose en appliquant le cadre."
footer_right: "Questions & Rรฉponses"

sections:
  - number: "Q 1"
    title: "Instrument bruitรฉ : comment coupler $Y \\mid X \\sim \\mathcal{N}(X, \\varepsilon^2)$ ?"
    uses: [exp-family, nat-param, conjugate-prior, cs-gaussian]
    content:
      - type: h3
        text: "La question"
      - type: p
        text: "On a une variable latente $X$ modรฉlisรฉe par un nล“ud NIG. On observe un instrument $Y$ tel que $Y \\mid X \\sim \\mathcal{N}(X, \\varepsilon^2)$, oรน $\\varepsilon^2$ est la variance connue du bruit de mesure. Comment encoder cette relation dans le graphe d'infรฉrence ?"
      - type: h3
        text: "Le setup"
      - type: p
        text: "On a deux ingrรฉdients :"
      - type: table
        headers: ["Variable", "Modรจle", "Rรดle"]
        rows:
          - ["$X$", "$\\text{NIG}(\\lambda_0^X, \\nu_0^X)$", "Variable latente (le prior sur la vraie valeur)"]
          - ["$Y \\mid X$", "$\\mathcal{N}(X, \\varepsilon^2)$", "Instrument bruitรฉ (on observe les $y_i$)"]
      - type: p
        text: "L'observation $y \\mid x \\sim \\mathcal{N}(x, \\varepsilon^2)$ est un modรจle Gaussien dont la *moyenne* est inconnue (c'est $x$, le couplage) et la *variance* est connue ($\\varepsilon^2$, le bruit de l'instrument)."
      - type: h3
        text: "Traduction en nล“uds du graphe"
      - type: p
        text: "On crรฉe un *nล“ud Y* de type NIG, couplรฉ au nล“ud $X$ :"
      - type: table
        headers: ["Paramรจtre", "Valeur", "Raison"]
        rows:
          - ["$\\mu_0^Y$", "$0$", "Prior vague โ€” l'instrument seul ne sait rien"]
          - ["$\\sigma_0^{2,Y}$", "Grand (e.g. $100$)", "Prior non-informatif"]
          - ["$\\nu_0^Y$", "Petit (e.g. $0.1$)", "Trรจs peu de pseudo-observations a priori"]
          - ["Observations", "$y_1, \\dots, y_m$", "Les mesures de l'instrument"]
      - type: h3
        text: "La force de couplage"
      - type: p
        text: "Le couplage $X \\leftrightarrow Y$ doit encoder la relation $Y \\mid X \\sim \\mathcal{N}(X, \\varepsilon^2)$. La force naturelle est :"
      - type: box
        title: "Force de couplage instrument"
        tex: "\\nu_0^{\\text{couplage}} = \\frac{1}{\\varepsilon^2}"
      - type: p
        text: "L'interprรฉtation est directe : $Y \\mid X \\sim \\mathcal{N}(X, \\varepsilon^2)$ revient ร  dire qu'on a $1/\\varepsilon^2$ pseudo-observations de force qui tirent $Y$ vers $X$. Plus $\\varepsilon$ est petit (instrument prรฉcis), plus le couplage est fort. ร€ la limite $\\varepsilon \\to 0$, le couplage est infini et $Y \\to X$."
      - type: callout
        title: "Pourquoi $\\lambda_0 = 0$ reste correct ?"
        text: "Le couplage impose que $Y$ soit attirรฉ vers l'*estimation courante* de $X$ (via $\\hat{\\eta}_X$), pas vers une valeur fixe. Le biais directionnel vient de $X$, pas du lien โ€” d'oรน $\\lambda_0 = 0$ dans l'arรชte."
      - type: h3
        text: "Attention : $\\nu_0$ par arรชte"
      - type: p
        text: "Ce cas montre qu'un $\\nu_0$ *global* (identique pour tous les liens) est trop restrictif. Deux instruments avec des prรฉcisions $\\varepsilon_1^2 \\neq \\varepsilon_2^2$ nรฉcessitent des forces de couplage diffรฉrentes : $1/\\varepsilon_1^2$ et $1/\\varepsilon_2^2$. Il faut donc un $\\nu_0$ *par arรชte* (en gardant $\\lambda_0 = 0$ forcรฉ)."
      - type: h3
        text: "Raccourci : pas de nล“ud $Y$ sรฉparรฉ"
      - type: p
        text: "Si on prรฉfรจre ne pas crรฉer de nล“ud $Y$, on peut absorber les observations de l'instrument directement dans le nล“ud $X$. Chaque observation $y_i$ contribue ร  la statistique suffisante de $X$ avec un poids $1/\\varepsilon^2$ :"
      - type: math
        tex: "\\lambda_n^X = \\lambda_0^X + \\sum_i T(x_i) + \\frac{1}{\\varepsilon^2} \\sum_j y_j, \\qquad \\nu_n^X = \\nu_0^X + n_x + \\frac{m}{\\varepsilon^2}"
      - type: p
        text: "Ce raccourci est รฉquivalent quand l'instrument n'est connectรฉ qu'ร  $X$. En revanche, si $Y$ a *plusieurs* connexions (e.g. un instrument qui mesure une combinaison de variables), il faut un nล“ud sรฉparรฉ."
