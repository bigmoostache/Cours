chapter: "Q&A"
label: "Inférence Bayésienne · Questions & Réponses"
title: "Questions & Réponses"
subtitle: "Cas pratiques, interprétations et pièges courants — les questions que l'on se pose en appliquant le cadre."
footer_right: "Questions & Réponses"

sections:
  - number: "Q 1"
    title: "Instrument bruité : coupler $Y \\mid X \\sim \\mathcal{N}(X, \\varepsilon^2)$"
    uses: [exp-family, nat-param, suff-stat, log-partition, conjugate-prior, lambda, nu, bayesian-update, tilted-param, eta-xy, cs-gaussian, cs-nig]
    content:
      - type: h3
        text: "Énoncé du problème"
      - type: p
        text: "On dispose d'une variable latente $X$ dont on modélise le paramètre $\\eta_X = (\\mu_X/\\sigma_X^2,\\, -1/(2\\sigma_X^2))$ par un prior conjugué NIG$(\\lambda_0^X, \\nu_0^X)$. Un instrument bruité fournit des mesures $y_1, \\dots, y_m$ avec :"
      - type: math
        label: "Modèle d'observation"
        tex: "Y \\mid X = x \\;\\sim\\; \\mathcal{N}(x,\\, \\varepsilon^2)"
      - type: p
        text: "où $\\varepsilon^2$ est la variance connue du bruit de mesure. Comment encoder cette relation dans le graphe d'inférence ?"

      - type: h3
        text: "Identification dans le cadre exponentiel"
      - type: p
        text: "Rappelons la forme canonique d'une famille exponentielle (Ch. 1, §1) :"
      - type: math
        tex: "p(z \\mid \\eta) = h(z)\\,\\exp\\!\\bigl(\\eta^\\top T(z) - A(\\eta)\\bigr)"
      - type: p
        text: "Pour la Gaussienne $\\mathcal{N}(\\mu, \\sigma^2)$ (Ch. 1, §7), les identifications sont $T(z) = (z,\\, z^2)$, $\\eta = (\\mu/\\sigma^2,\\, -1/(2\\sigma^2))$, $h(z) = 1/\\sqrt{2\\pi}$."
      - type: p
        text: "Maintenant, développons $p(y \\mid x) = \\mathcal{N}(x, \\varepsilon^2)$ et identifions chaque terme. La moyenne est $\\mu = x$ (le couplage) et la variance est $\\sigma^2 = \\varepsilon^2$ (connue). L'exposant s'écrit :"
      - type: math
        tex: "\\log p(y \\mid x) = \\underbrace{\\frac{x}{\\varepsilon^2}}_{\\eta_Y^{(1)*}(x)} \\cdot \\underbrace{y}_{T_Y^{(1)}} \\;+\\; \\underbrace{\\Bigl(-\\frac{1}{2\\varepsilon^2}\\Bigr)}_{\\eta_Y^{(2)*}} \\cdot \\underbrace{y^2}_{T_Y^{(2)}} \\;-\\; \\underbrace{\\frac{x^2}{2\\varepsilon^2} + \\frac{1}{2}\\log(2\\pi\\varepsilon^2)}_{A(\\eta_Y^*) + \\text{cst}}"
      - type: p
        text: "C'est bien la forme canonique $\\eta_Y^{*\\top} T_Y(y) - A(\\eta_Y^*)$ avec $T_Y(y) = (y,\\, y^2)$ — la statistique suffisante gaussienne bidimensionnelle. Le paramètre naturel de $Y$, *incliné* par $x$, est :"
      - type: math
        tex: "\\eta_Y^*(x) = \\begin{pmatrix} x/\\varepsilon^2 \\\\ -1/(2\\varepsilon^2) \\end{pmatrix} = \\underbrace{\\begin{pmatrix} 0 \\\\ -1/(2\\varepsilon^2) \\end{pmatrix}}_{\\eta_Y \\text{ (prior marginal)}} + \\underbrace{\\begin{pmatrix} 1/\\varepsilon^2 & 0 \\\\ 0 & 0 \\end{pmatrix}}_{\\eta_{XY}} \\underbrace{\\begin{pmatrix} x \\\\ x^2 \\end{pmatrix}}_{T_X(x)}"
      - type: p
        text: "On lit directement la structure du Chapitre 5, §2–3. Le terme d'interaction $T_X(x)^\\top \\eta_{XY}\\, T_Y(y)$ fait apparaître la matrice :"
      - type: box
        title: "Matrice d'interaction instrument"
        tex: "\\eta_{XY} = \\begin{pmatrix} 1/\\varepsilon^2 & 0 \\\\ 0 & 0 \\end{pmatrix}"
      - type: p
        text: "Trois zéros sur quatre. Le couplage passe *exclusivement* par les premières composantes $T_X^{(1)}(x) = x$ et $T_Y^{(1)}(y) = y$ — les positions. Les secondes composantes $(x^2, y^2)$ ne sont pas couplées : l'instrument lie les *moyennes* de $X$ et $Y$, pas leurs *variances*. La composante $\\eta_Y^{(2)} = -1/(2\\varepsilon^2)$ est fixe — elle encode la variance connue de l'instrument, pas un paramètre à inférer."
      - type: callout
        title: "Le terme croisé, concrètement."
        text: "Le seul produit $x \\cdot y$ dans l'exposant est $\\frac{1}{\\varepsilon^2}\\, T_X^{(1)} \\cdot T_Y^{(1)}$. Il n'y a aucun terme en $x^2 y$, $x y^2$ ou $x^2 y^2$ — d'où les trois zéros dans $\\eta_{XY}$. Physiquement : l'instrument mesure la *valeur* de $X$, pas sa *dispersion*."

      - type: h3
        text: "Construction du nœud $Y$ dans le graphe"
      - type: p
        text: "Le graphe contient deux nœuds $X$ et $Y$, chacun muni de son prior conjugué :"
      - type: table
        headers: ["Nœud", "Prior conjugué", "Statistique suffisante", "Rôle"]
        rows:
          - ["$X$", "$p(\\eta_X) \\propto \\exp(\\eta_X^\\top \\lambda_0^X - \\nu_0^X A(\\eta_X))$", "$T_X(x) = (x,\\, x^2)$", "Variable latente"]
          - ["$Y$", "$p(\\eta_Y) \\propto \\exp(\\eta_Y^\\top \\lambda_0^Y - \\nu_0^Y A(\\eta_Y))$", "$T_Y(y) = (y,\\, y^2)$", "Mesure instrument"]
      - type: p
        text: "Le lien $X \\leftrightarrow Y$ est une arête du champ de Markov exponentiel (Ch. 5, §6) avec la matrice d'interaction ci-dessus et $\\lambda_0^{(XY)} = 0$."
      - type: p
        text: "Le prior du nœud $Y$ doit être *vague* — l'instrument seul n'a pas de croyance a priori sur la valeur mesurée. On pose :"
      - type: math
        tex: "\\lambda_0^Y = \\nu_0^Y \\cdot \\begin{pmatrix} \\mu_0^Y / \\sigma_0^{2,Y} \\\\ -1/(2\\sigma_0^{2,Y}) \\end{pmatrix} \\quad \\text{avec } \\mu_0^Y = 0,\\; \\sigma_0^{2,Y} \\gg 1,\\; \\nu_0^Y \\to 0"

      - type: h3
        text: "Mise à jour de $Y$ — les deux additions"
      - type: p
        text: "Les $m$ observations $y_1, \\dots, y_m$ de l'instrument mettent à jour le nœud $Y$ par la règle universelle (Ch. 4, §4) :"
      - type: box
        title: "Posterior du nœud $Y$"
        tex: "\\lambda_m^Y = \\lambda_0^Y + \\sum_{j=1}^m T_Y(y_j) = \\lambda_0^Y + \\begin{pmatrix} \\sum y_j \\\\ \\sum y_j^2 \\end{pmatrix}, \\qquad \\nu_m^Y = \\nu_0^Y + m"
      - type: p
        text: "Avec $\\nu_0^Y \\to 0$, on a $\\lambda_m^Y / \\nu_m^Y \\to (\\bar{y},\\, \\overline{y^2})$ — l'estimateur de vraisemblance, comme attendu (Ch. 4, §8)."

      - type: h3
        text: "Propagation du couplage dans l'EM"
      - type: p
        text: "Lors de l'itération EM (Ch. 7), le paramètre incliné de $Y$ sachant l'estimation courante $\\hat{\\eta}_X$ est :"
      - type: math
        label: "Inclinaison par le voisin $X$"
        tex: "\\eta_Y^{\\,*} = \\eta_Y + \\eta_{XY}^\\top\\, \\hat{\\eta}_X = \\begin{pmatrix} \\eta_Y^{(1)} + \\hat{\\eta}_X^{(1)}/\\varepsilon^2 \\\\ \\eta_Y^{(2)} \\end{pmatrix}"
      - type: p
        text: "Et symétriquement, l'estimation de $X$ est inclinée par $Y$ :"
      - type: math
        tex: "\\eta_X^{\\,*} = \\eta_X + \\eta_{XY}\\, \\hat{\\eta}_Y = \\begin{pmatrix} \\eta_X^{(1)} + \\hat{\\eta}_Y^{(1)}/\\varepsilon^2 \\\\ \\eta_X^{(2)} \\end{pmatrix}"
      - type: p
        text: "Seule la première composante (position) est affectée — la seconde (précision) ne passe pas à travers le couplage. La force $1/\\varepsilon^2$ contrôle l'intensité de cette inclinaison mutuelle sur les moyennes."

      - type: h3
        text: "Interprétation en termes de $\\lambda$ et $\\nu$"
      - type: p
        text: "Le couplage se lit naturellement dans le formalisme du Chapitre 5, §7. La mise à jour croisée accumule :"
      - type: table
        headers: ["Bloc de $\\lambda$", "Accumulation", "Information portée"]
        rows:
          - ["$\\lambda^{(X)}$", "$\\lambda_0^X + \\sum_i T_X(x_i)$", "Observations directes de $X$"]
          - ["$\\lambda^{(Y)}$", "$\\lambda_0^Y + \\sum_j T_Y(y_j)$", "Mesures de l'instrument"]
          - ["$\\lambda^{(XY)}$", "$\\lambda_0^{(XY)} + \\nu_0^{\\text{couplage}} \\cdot \\hat{\\eta}_{\\text{voisin}}$", "Couplage — tilt par le voisin"]
      - type: p
        text: "Puisque $\\lambda_0^{(XY)} = 0$, le couplage n'introduit aucun biais directionnel — il ne fait que *rapprocher* les estimations voisines, avec une force proportionnelle à la précision de l'instrument $1/\\varepsilon^2$. C'est le même mécanisme de shrinkage (Ch. 4, §4) : le ratio $\\lambda_n / \\nu_n$ interpole entre les données propres du nœud et l'influence de ses voisins."

      - type: h3
        text: "La force de couplage est la précision de l'instrument"
      - type: p
        text: "Le résultat est élégant :"
      - type: box
        title: "Correspondance instrument–couplage"
        tex: "Y \\mid X \\sim \\mathcal{N}(X, \\varepsilon^2) \\quad \\Longleftrightarrow \\quad \\eta_{XY} = \\begin{pmatrix} 1/\\varepsilon^2 & 0 \\\\ 0 & 0 \\end{pmatrix}, \\quad \\lambda_0^{(XY)} = 0"
      - type: p
        text: "La précision $1/\\varepsilon^2$ de l'instrument apparaît dans le seul coefficient non nul de $\\eta_{XY}$. Plus l'instrument est précis ($\\varepsilon \\to 0$), plus $(\\eta_{XY})_{11} \\to \\infty$ et le couplage force $Y \\to X$. Plus il est bruité ($\\varepsilon \\to \\infty$), plus $\\eta_{XY} \\to 0$ et les nœuds deviennent indépendants — exactement le critère de Hammersley-Clifford (Ch. 5, §6)."
      - type: callout
        title: "Conséquence pour le simulateur."
        text: "Ce cas montre qu'un $\\nu_0$ de couplage *global* (identique pour tous les liens) est trop restrictif. Deux instruments avec des précisions $\\varepsilon_1^2 \\neq \\varepsilon_2^2$ nécessitent $\\eta_{XY} = 1/\\varepsilon_1^2$ et $\\eta_{XZ} = 1/\\varepsilon_2^2$ — il faut un $\\eta_{XY}$ *par arête*."

      - type: h3
        text: "Raccourci : absorption directe dans le nœud $X$"
      - type: p
        text: "Si l'instrument $Y$ n'est connecté qu'à $X$ (pas d'autre voisin), on peut marginaliser $Y$ et absorber les observations directement dans $X$. La statistique suffisante croisée (Ch. 5, §7) se simplifie :"
      - type: math
        tex: "\\lambda_n^X = \\lambda_0^X + \\sum_{i=1}^{n_x} T(x_i) + \\frac{1}{\\varepsilon^2}\\sum_{j=1}^m \\begin{pmatrix} y_j \\\\ y_j^2 \\end{pmatrix}, \\qquad \\nu_n^X = \\nu_0^X + n_x + \\frac{m}{\\varepsilon^2}"
      - type: p
        text: "Chaque mesure $y_j$ contribue $1/\\varepsilon^2$ pseudo-observations à la mémoire $\\lambda^X$ — exactement le poids que lui attribue la précision de l'instrument. Si $\\varepsilon^2 = \\sigma_X^2$ (instrument aussi bon qu'une observation directe), chaque $y_j$ vaut exactement une observation de $X$."
      - type: callout
        title: "Quand le raccourci ne marche pas."
        text: "Si $Y$ a plusieurs voisins dans le graphe (e.g. un instrument qui mesure une combinaison de variables), la marginalisation de $Y$ fait apparaître la log-partition $A_Y(\\eta_Y^*)$ au paramètre incliné — une fonction non linéaire (Ch. 5, §4). On sort de la famille exponentielle et il faut garder $Y$ comme nœud séparé."

      - type: h3
        text: "Note — $n$ nœuds séparés vs. un nœud unique avec $n$ observations"
      - type: p
        text: "Faire $n$ nœuds $Y_1, \\dots, Y_n$ couplés à $X$ avec la même matrice $\\eta_{XY}$, chacun portant une observation, est *équivalent* à un unique nœud $Y$ portant les $n$ observations. C'est une conséquence directe de la suffisance (Ch. 4, §2) : les $n$ nœuds accumulent les mêmes statistiques $\\sum y_j$ et $\\sum y_j^2$ que le nœud unique. Du point de vue de $X$, les deux configurations sont indiscernables."
      - type: p
        text: "L'équivalence se brise dès que les forces de couplage diffèrent : $\\eta_{XY_j} \\neq \\eta_{XY_k}$. Un nœud unique ne peut pas pondérer ses observations selon leur fiabilité — la règle $\\lambda_n = \\lambda_0 + \\sum T(y_j)$ donne un poids unitaire à chaque observation. Des nœuds séparés avec des $\\eta_{XY_j}$ distincts résolvent ce problème : chaque instrument contribue proportionnellement à sa précision."
      - type: p
        text: "En pratique, pour un instrument donné, la précision $\\varepsilon^2$ est connue a priori (spécification constructeur, calibration). Le couplage $\\eta_{XY} = \\mathrm{diag}(1/\\varepsilon^2, 0)$ est donc fixé *avant* d'observer quoi que ce soit. Toutes les mesures de cet instrument ont la même fiabilité : un nœud unique est plus cohérent — il reflète le fait qu'il y a *un* instrument, pas $n$ instruments distincts. On réserve les nœuds multiples au cas où plusieurs instruments de précisions différentes mesurent la même variable latente $X$."
